<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Practice Syntax of English Service</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <script src="/static/edit_user.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Practice Syntax of English Service</h1>
        </div>
        <div class="content">
            <h3>Edit user</h3>
            <div class="form-group">
                <label for="mode">Transaction type</label>
                <input id="mode" type="text" value="{{ mode }}" readonly></input>
            </div>
            <div class="regist-form">
                <h3>Regist user</h3>
                <div class="form-group">
                    <label for="userName">user name</label>
                    <input id="userName" type="text" value="{{ userName }}"placeholder="ユーザー名を入力">
                </div>
                {% if mode != "delete" %}
                    <div class="form-group">
                        <label for="password">password</label>
                        <input id="password" type="password" placeholder="パスワードを入力">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">confirm password</label>
                        <input id="confirmPassword" type="password" placeholder="パスワードを再入力">
                    </div>
                {% endif %}
            </div>
            <div class="button-area">
                <button id="submitButton">
                    submit
                </button>
                {% if model == "create" %}
                    <button onclick="location.href='/'">back to login</button>
                {% else %}
                    <button onclick="location.href='/start'">back to start</button>
                {% endif %}
            </div>
        </div>
        <div id="modal">
            <div id="modal-content">
                <p id="user-name"></p>
                <p id="condition-message"></p>
                <div class=""button-area">
                    <button id="next-button" onclick="location.href='/'">back to Login</button>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 Practice Syntax of English Service. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
