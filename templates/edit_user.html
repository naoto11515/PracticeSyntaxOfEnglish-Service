<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Practice Syntax of English Service</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <script src="/static/edit_user.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Practice Syntax of English Service</h1>
        </div>
        <div class="content">
            <form class="edit-user-form" id="editUserForm" novalidate>
                <h2>Edit user</h2>
                <div class="regist-form">
                    <div class="form-group">
                        <label for="mode">Transaction type</label>
                        <input id="mode" name="mode" type="text" value="{{ mode }}" readonly></input>
                    </div>
                    <div class="form-group">
                        <label for="userName">user name</label>
                        <input id="userName" name="userName" type="text" value="{{ userName }}"placeholder="ユーザー名を入力" required>
                    </div>
                    {% if mode != "delete" %}
                        <div class="form-group">
                            <label for="password">password</label>
                            <input id="password" name="password" type="password" placeholder="パスワードを入力" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">confirm password</label>
                            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="パスワードを再入力" required>
                        </div>
                    {% endif %}
                </div>
                <div class="button-area">
                    <button id="submitButton" type="submit">
                        submit
                    </button>
                    {% if model == "create" %}
                        <button type="button" onclick="location.href='/'">back to login</button>
                    {% else %}
                        <button type="button" onclick="location.href='/start'">back to start</button>
                    {% endif %}
                </div>
            </form>
        </div>
        <div id="modal">
            <div id="modal-content">
                <p id="user-name"></p>
                <p id="condition-message"></p>
                <div class=""button-area">
                    <button type="button" onclick="location.href='/'">back to Login</button>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 Practice Syntax of English Service. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
