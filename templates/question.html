<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Practice Syntax of English Service</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <script src="/static/question.js?v=1" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Practice Syntax of English Service</h1>
        </div>
        <div class="content">
            <form class="question-form" id="questionForm" novalidate>
                <h2>Question page</h2>
                <div class="content-header">
                    <p id="startIdText">Start ID: {{ startId }}</p>
                    <p id="levelCategory">Level category: {{ levelCategory }}</p>
                    <p id="level">Level: {{ level }}</p>
                    <p id="numberquestions">Question: {{ rowNumber }} of {{ numberquestions }}</p>
                    <input type="hidden" id="sessionId" name="sessionId" value="{{ sessionId }}">
                    <input type="hidden" id="startId" name="startId" value="{{ startId }}">
                    <input type="hidden" id="rowNumber" name="rowNumber" value="{{ rowNumber }}">
                </div>
                <div class="form-group">
                    <label for="japaneseSentence">Japanese sentence</label>
                    <p id="japaneseSentence"> {{ japaneseSentence }}</p>
                </div>
                <div class="form-group">
                    <label for="answer">answer</label>
                    <input id="answer" name="answer" type="text" required>
                </div>
                <div class="hint-area">
                    <button id = "displayButton" type="button" onclick="toggeleText()">display hint</button>
                    <p id="hint">Syntax: {{ syntax }}</p>
                </div>
                <div class="button-area">
                    <button id="submitButton" type="submit">
                        submit
                    </button>
                    <button type="button" onclick="location.href='/start'">
                        back to start
                    </button>
            </form>
        </div>
        <div id="modal">
            <div id="modal-content">
                <p id="result-message"></p>
                <p id="correct-answer"></p>
                <p id="explanation-message"></p>
                <div class="button-area">
                    <button id="next-button" type="button" onclick="goToNext()">次へ進む</button>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 Practice Syntax of English Service. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
